<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D AI Target Challenge | Powered by Meshy.ai</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00f2ff;
      --secondary: #7000ff;
      --bg: #050507;
      --panel: rgba(15, 15, 20, 0.85);
      --border: rgba(0, 242, 255, 0.3);
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
    }

    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
      z-index: 10;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
      color: var(--primary);
      text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
    }

    .stats {
      background: var(--panel);
      padding: 1rem 2rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      display: flex;
      gap: 2rem;
      pointer-events: auto;
    }

    .stat-item {
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.2rem;
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: #fff;
    }

    #game-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .bottom-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      pointer-events: auto;
    }

    button {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border: none;
      color: white;
      padding: 1rem 2.5rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .overlay {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>

  <div id="ui-container">
    <div class="top-bar">
      <div class="game-title">NEON STRIKE</div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-label">SCORE</div>
          <div id="score" class="stat-value">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">TIME</div>
          <div id="time" class="stat-value">15</div>
        </div>
      </div>
    </div>

    <div id="message">GET READY!</div>

    <div class="bottom-bar">
      <button id="startBtn">INITIALIZE ENGINE</button>
    </div>

    <div class="overlay">Asset Workflow: Meshy.ai → Three.js</div>
  </div>

  <canvas id="game-canvas"></canvas>

  <!-- Three.js Library -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const canvas = document.getElementById('game-canvas');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const startBtn = document.getElementById('startBtn');
    const messageEl = document.getElementById('message');

    let score = 0;
    let timeLeft = 15;
    let timerId = null;
    let isGameRunning = false;

    // --- Three.js Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050507);
    scene.fog = new THREE.Fog(0x050507, 5, 25);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 10;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const mainLight = new THREE.PointLight(0x00f2ff, 20, 50);
    mainLight.position.set(5, 5, 10);
    scene.add(mainLight);

    const secondaryLight = new THREE.PointLight(0x7000ff, 15, 50);
    secondaryLight.position.set(-5, -5, 5);
    scene.add(secondaryLight);

    // Floor Grid (Meshy.ai style environment)
    const grid = new THREE.GridHelper(100, 40, 0x00f2ff, 0x111111);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = -5;
    scene.add(grid);

    // Target Object
    let targetMesh;
    const loader = new GLTFLoader();

    // Placeholder Target (Sphere with Neon Glow)
    const geometry = new THREE.SphereGeometry(1, 32, 32);
    const material = new THREE.MeshStandardMaterial({ 
      color: 0xffffff,
      metalness: 0.9,
      roughness: 0.1,
      emissive: 0x00f2ff,
      emissiveIntensity: 0.5
    });
    targetMesh = new THREE.Mesh(geometry, material);
    targetMesh.visible = false;
    scene.add(targetMesh);

    // Raycaster for clicking
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function moveTarget() {
      const x = (Math.random() - 0.5) * 12;
      const y = (Math.random() - 0.5) * 8;
      const z = (Math.random() - 0.5) * 4;
      targetMesh.position.set(x, y, z);
      targetMesh.scale.set(0, 0, 0);
      
      // Basic entrance animation
      new Promise(resolve => {
        let s = 0;
        const grow = () => {
          s += 0.1;
          targetMesh.scale.set(s, s, s);
          if (s < 1) requestAnimationFrame(grow);
          else resolve();
        };
        grow();
      });
    }

    function onMouseClick(event) {
      if (!isGameRunning) return;

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(targetMesh);

      if (intersects.length > 0) {
        score++;
        scoreEl.textContent = score;
        
        // Visual feedback
        targetMesh.material.emissive.setHex(0xff00ff);
        setTimeout(() => targetMesh.material.emissive.setHex(0x00f2ff), 100);
        
        moveTarget();
      }
    }

    function startGame() {
      score = 0;
      timeLeft = 15;
      isGameRunning = true;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      
      startBtn.disabled = true;
      targetMesh.visible = true;
      moveTarget();

      messageEl.textContent = "STRIKE!";
      messageEl.style.opacity = 1;
      setTimeout(() => messageEl.style.opacity = 0, 1000);

      timerId = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function endGame() {
      clearInterval(timerId);
      isGameRunning = false;
      targetMesh.visible = false;
      startBtn.disabled = false;
      startBtn.textContent = "REBOOT SYSTEM";
      
      messageEl.textContent = `FINAL SCORE: ${score}`;
      messageEl.style.opacity = 1;
    }

    window.addEventListener('click', onMouseClick);
    startBtn.addEventListener('click', startGame);

    // Resize Handler
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation Loop
    function animate(time) {
      requestAnimationFrame(animate);
      
      if (targetMesh) {
        targetMesh.rotation.y += 0.02;
        targetMesh.rotation.x += 0.01;
        // Floating effect
        targetMesh.position.y += Math.sin(time * 0.005) * 0.005;
      }

      // Background movement
      mainLight.position.x = Math.sin(time * 0.001) * 10;
      secondaryLight.position.y = Math.cos(time * 0.001) * 10;

      renderer.render(scene, camera);
    }
    animate();

  </script>
</body>
</html>
